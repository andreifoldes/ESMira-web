<!-- Android notification badge: white silhouette on transparent bg.
     Android tints all non-transparent pixels, so only the alpha shape matters.
     Padded viewBox keeps the glyph inside the center ~66% so it isn't clipped.
     Regenerate PNGs: rsvg-convert -w 96 -h 96 badge.svg -o badge-96x96.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 32 32" width="96" height="96">
  <path fill="#ffffff" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
</svg>
